services:
  - type: web_service
    name: store-intelligence-api
    env: docker
    dockerfilePath: Dockerfile
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: POS_DATA_PATH
        value: /app/data/pos_transactions.csv
      - key: DB_PATH
        value: /app/db/store_intelligence.db

  - type: web_service
    name: store-intelligence-dashboard
    env: docker
    dockerfilePath: Dockerfile.dashboard
    plan: starter
    autoDeploy: true
    startCommand: streamlit run dashboard/app.py --server.port 10001 --server.address 0.0.0.0
    envVars:
      - key: API_URL
        value: https://store-intelligence-api.onrender.com
